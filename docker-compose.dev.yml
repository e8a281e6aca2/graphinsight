services:
  neo4j:
    image: neo4j:5.26
    container_name: graphinsight-neo4j
    restart: unless-stopped
    ports:
      - "${GRAPHINSIGHT_NEO4J_HTTP_PORT:-7474}:7474"
      - "${GRAPHINSIGHT_NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: "${GRAPHINSIGHT_NEO4J_USER:-neo4j}/${GRAPHINSIGHT_NEO4J_PASSWORD:-change-this-password}"
    volumes:
      - graphinsight_neo4j_data:/data
      - graphinsight_neo4j_logs:/logs
      - graphinsight_neo4j_plugins:/plugins
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -a bolt://localhost:7687 -u ${GRAPHINSIGHT_NEO4J_USER:-neo4j} -p ${GRAPHINSIGHT_NEO4J_PASSWORD:-change-this-password} 'RETURN 1;' >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  graphinsight_neo4j_data:
  graphinsight_neo4j_logs:
  graphinsight_neo4j_plugins:
