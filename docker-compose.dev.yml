services:
  postgres:
    image: postgres:16-alpine
    container_name: graphinsight-postgres
    restart: unless-stopped
    ports:
      - "${GRAPHINSIGHT_ADMIN_DB_PORT:-5434}:5432"
    environment:
      POSTGRES_DB: "${GRAPHINSIGHT_ADMIN_DB_NAME:-graphinsight_admin}"
      POSTGRES_USER: "${GRAPHINSIGHT_ADMIN_DB_USER:-graphinsight}"
      POSTGRES_PASSWORD: "${GRAPHINSIGHT_ADMIN_DB_PASSWORD:-graphinsight-dev-password}"
    volumes:
      - graphinsight_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${GRAPHINSIGHT_ADMIN_DB_USER:-graphinsight} -d ${GRAPHINSIGHT_ADMIN_DB_NAME:-graphinsight_admin} || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  neo4j:
    image: neo4j:5.26.26
    container_name: graphinsight-neo4j
    restart: unless-stopped
    ports:
      - "${GRAPHINSIGHT_NEO4J_HTTP_PORT:-7474}:7474"
      - "${GRAPHINSIGHT_NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: "${GRAPHINSIGHT_NEO4J_USER:-neo4j}/${GRAPHINSIGHT_NEO4J_PASSWORD:-change-this-password}"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - graphinsight_neo4j_data:/data
      - graphinsight_neo4j_logs:/logs
      - graphinsight_neo4j_plugins:/plugins
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -a bolt://localhost:7687 -u ${GRAPHINSIGHT_NEO4J_USER:-neo4j} -p ${GRAPHINSIGHT_NEO4J_PASSWORD:-change-this-password} 'RETURN 1;' >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  graphinsight_postgres_data:
  graphinsight_neo4j_data:
  graphinsight_neo4j_logs:
  graphinsight_neo4j_plugins:
